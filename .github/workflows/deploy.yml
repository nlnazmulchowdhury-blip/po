name: Build and Deploy Next.js to VistaPanel

on:
  push:
    branches:
      - main  # আপনার মেইন ব্রাঞ্চের নাম অন্য কিছু হলে (যেমন master) তা এখানে লিখবেন

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🏗️ Build Static Site
      run: npm run build
      # মনে রাখবেন: আপনার next.config.ts ফাইলে output: 'export' কনফিগার করা থাকতে হবে।

    - name: 📂 Sync HTML files to VistaPanel
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./out/  # Next.js export করার পর ফাইলগুলো 'out' ফোল্ডারে জমা হয়
        server-dir: ./htdocs/
