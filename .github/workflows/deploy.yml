name: Build and Deploy Next.js to VistaPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: 📦 Install dependencies
      run: npm install --legacy-peer-deps

    - name: 🏗️ Build Static Site
      # এখানে env সেট করার কারণে আপনার next.config-এর 'isStaticExport' ট্রু (true) হবে
      env:
        UNAUX_STATIC_EXPORT: 'true'
      run: npm run build

    - name: 📂 Sync HTML files to VistaPanel
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./out/
        server-dir: ./htdocs/
        dangerous-clean-slate: false