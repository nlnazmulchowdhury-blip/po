name: Build and Deploy Next.js to VistaPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Checkout code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🏗️ Build Static Site
      run: npm run build
      env:
        UNAUX_STATIC_EXPORT: 'true'

    - name: 📂 Sync HTML files to VistaPanel
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./out/
        server-dir: ./htdocs/
        dangerous-clean-slate: false  # এটি আপনার হোস্টিংয়ে থাকা ডাটাবেজ বা অন্য কোনো আপলোডেড ফাইল কখনোই ডিলিট করবে না